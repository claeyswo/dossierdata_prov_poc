database:
  url: "postgresql+asyncpg://dossier:dossier@127.0.0.1:5432/dossiers"

plugins:
  - dossier_toelatingen

auth:
  mode: "poc"

file_service:
  signing_key: "poc-signing-key-change-in-production"
  url: "http://localhost:8001"
  storage_root: "./file_storage"

# Audit log configuration. When `log_path` is set, the app emits
# NDJSON audit events to the given file. When unset (the default),
# `emit_audit()` is a silent no-op, so dev and test environments
# don't need to provision the audit directory. In production, set
# this to /var/log/dossier/audit.json and have the Wazuh agent
# tail it (see README "Audit Log" for the ossec.conf block).
audit:
  # log_path: "/var/log/dossier/audit.json"
  # max_bytes: 104857600     # 100 MB per file
  # backup_count: 10         # keep 10 rotated files (~1 GB ceiling)

# Global access rules — apply to ALL dossiers regardless of workflow.
# Same format as dossier_access entries.
# Use "view": [] with activity_view: "all" to see all activities but no entity content.
# Omit "view" entirely for full access.
global_access:
  - role: "systeemgebruiker"
    view: "all"
    activity_view: "all"
  - role: "beheerder"
    view: "all"
    activity_view: "all"
