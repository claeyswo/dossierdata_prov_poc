database:
  url: "postgresql+asyncpg://dossier:dossier@127.0.0.1:5432/dossiers"

plugins:
  - dossier_toelatingen

auth:
  mode: "poc"

file_service:
  signing_key: "poc-signing-key-change-in-production"
  url: "http://localhost:8001"
  storage_root: "./file_storage"

# Global access rules — apply to ALL dossiers regardless of workflow.
# Same format as dossier_access entries.
# Use "view": [] with activity_view: "all" to see all activities but no entity content.
# Omit "view" entirely for full access.
global_access:
  - role: "systeemgebruiker"
    activity_view: "all"
    # no "view" key = see everything
  - role: "beheerder"
    activity_view: "all"
