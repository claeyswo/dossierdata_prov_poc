# Workflow-wide PROV-extension relations. Any activity in this workflow may
# emit these on its request body unless it overrides the list with its own
# `relations:` block. Each entry declares a relation type and the plugin
# must register a validator under that name (or accept pure-annotation
# semantics if no validator is registered).
relations:
  - type: "oe:neemtAkteVan"
    kind: "process_control"
    description: >
      Acknowledges that the client is aware of a newer version of an entity
      it used, and has chosen to proceed with the older version anyway. The
      engine rejects an activity whose `used` block references a stale
      entity version unless every intervening newer version is listed here.

  - type: "oe:betreft"
    kind: "domain"
    from_types: ["entity"]
    to_types: ["external_uri"]
    description: >
      Links an entity to the external object it concerns (e.g. an aanvraag
      to an erfgoedobject in the inventaris).

  - type: "oe:valtOnder"
    kind: "domain"
    from_types: ["entity"]
    to_types: ["external_uri"]
    description: >
      Legal basis classification — links a beslissing to the applicable
      legal article or regulation.

  - type: "oe:gerelateerd_aan"
    kind: "domain"
    from_types: ["dossier"]
    to_types: ["dossier"]
    description: >
      Cross-dossier relation — links this dossier to another related dossier.

# =====================================================================
# Field-level validators
# =====================================================================
# Exposed as POST /{workflow}/validate/{url_key}. Unlike the other seven
# Callable registries, the key stays a short user-facing string because
# it's part of the HTTP URL — but resolution still uses dotted paths so
# misconfiguration fails at plugin load, not at first-request time
# (Obs 95 / Round 28).

field_validators:
  erfgoedobject: "dossier_toelatingen.field_validators.erfgoedobject"
  handeling: "dossier_toelatingen.field_validators.handeling"

activities:

  - name: "dienAanvraagIn"
    label: "Dien aanvraag in"
    description: "Dien aanvraag in voor een toelating"
    can_create_dossier: true

    allowed_roles: ["oe:aanvrager"]
    default_role: "oe:aanvrager"

    authorization:
      access: "authenticated"

    forbidden:
      activities:
        - "dienAanvraagIn"

    used:
      - type: "object"
        external: true
        required: true
        description: "URI van het beschermd erfgoed object"

    generates:
      - "oe:aanvraag"

    status: "ingediend"

    validators:
      - name: "dossier_toelatingen.validators.valideer_indiening"
        description: "Valideert de aanvraag bij indiening"

    side_effects:
      - activity: "duidVerantwoordelijkeOrganisatieAan"
      - activity: "setSystemFields"

    tasks:
      - kind: "recorded"
        function: "dossier_toelatingen.tasks.move_bijlagen_to_permanent"
      - kind: "recorded"
        function: "dossier_toelatingen.tasks.send_ontvangstbevestiging"

    relations:
      - type: "oe:betreft"
        operations: [add]

  - name: "bewerkAanvraag"
    label: "Bewerk aanvraag"
    description: "Behandelaar bewerkt de aanvraag"
    can_create_dossier: false

    allowed_roles: ["oe:behandelaar"]
    default_role: "oe:behandelaar"

    authorization:
      access: "roles"
      roles:
        - role: "behandelaar"

    requirements:
      statuses:
        - "klaar_voor_behandeling"

    used:
      - type: "object"
        external: true
        required: true
        description: "URI van het beschermd erfgoed object"

    generates:
      - "oe:aanvraag"

    status: "ingediend"

    validators:
      - name: "dossier_toelatingen.validators.valideer_indiening"
        description: "Valideert de bewerkte aanvraag"

    side_effects:
      - activity: "duidVerantwoordelijkeOrganisatieAan"
      - activity: "setSystemFields"

    tasks:
      - kind: "recorded"
        function: "dossier_toelatingen.tasks.move_bijlagen_to_permanent"

  - name: "vervolledigAanvraag"
    label: "Vervolledig aanvraag"
    description: "Aanvrager vervolledig een onvolledige aanvraag"
    can_create_dossier: false

    allowed_roles: ["oe:aanvrager"]
    default_role: "oe:aanvrager"

    authorization:
      access: "roles"
      roles:
        - role: "kbo-toevoeger"
          scope:
            from_entity: "oe:aanvraag"
            field: "content.aanvrager.kbo"
        - from_entity: "oe:aanvraag"
          field: "content.aanvrager.rrn"

    requirements:
      statuses:
        - "aanvraag_onvolledig"

    used:
      - type: "object"
        external: true
        required: true
        description: "URI van het beschermd erfgoed object"

    generates:
      - "oe:aanvraag"

    status: "ingediend"

    validators:
      - name: "dossier_toelatingen.validators.valideer_indiening"
        description: "Valideert de vervolledigde aanvraag"

    side_effects:
      - activity: "duidVerantwoordelijkeOrganisatieAan"
      - activity: "setSystemFields"

    tasks:
      - kind: "recorded"
        function: "dossier_toelatingen.tasks.move_bijlagen_to_permanent"
      - kind: "recorded"
        function: "dossier_toelatingen.tasks.send_ontvangstbevestiging"

  - name: "doeVoorstelBeslissing"
    label: "Doe voorstel beslissing"
    description: "Behandelaar doet een voorstel voor een beslissing"
    can_create_dossier: false

    allowed_roles: ["oe:behandelaar"]
    default_role: "oe:behandelaar"

    authorization:
      access: "roles"
      roles:
        - role: "behandelaar"

    requirements:
      statuses:
        - "klaar_voor_behandeling"

    used:
      - type: "oe:aanvraag"
        required: false
        auto_resolve: "latest"
        description: "De aanvraag"

    generates:
      - "oe:beslissing"

    status: "beslissing_te_tekenen"

    validators: []
    side_effects: []
    relations:
      - type: "oe:neemtAkteVan"
        validator: "dossier_toelatingen.relation_validators.validate_neemt_akte_van"
    tasks: []

  - name: "tekenBeslissing"
    label: "Teken beslissing"
    description: "Ondertekenaar tekent de beslissing"
    can_create_dossier: false

    allowed_roles: ["oe:ondertekenaar"]
    default_role: "oe:ondertekenaar"

    # Split-style hooks: status comes from the named resolver,
    # tasks from the named builder(s). No handler — this activity
    # doesn't compute entity content beyond what the client submits
    # (the handtekening), so no handler is needed.
    status_resolver: "dossier_toelatingen.handlers.resolve_beslissing_status"
    task_builders:
      - "dossier_toelatingen.handlers.schedule_trekAanvraag_if_onvolledig"

    authorization:
      access: "roles"
      roles:
        - role: "beslisser"

    requirements:
      entities:
        - "oe:beslissing"
      statuses:
        - "beslissing_te_tekenen"

    used:
      - type: "oe:beslissing"
        required: false
        auto_resolve: "latest"
        description: "De beslissing die getekend wordt"

    generates:
      - "oe:handtekening"

    status: null

    validators: []
    side_effects: []
    relations:
      - type: "oe:neemtAkteVan"
        validator: "dossier_toelatingen.relation_validators.validate_neemt_akte_van"
    tasks: []

  - name: "neemBeslissing"
    label: "Neem beslissing"
    description: "Neem een beslissing. Kan direct aangeroepen worden of automatisch getriggerd via tekenBeslissing."
    can_create_dossier: false

    allowed_roles: ["oe:verantwoordelijke_organisatie"]
    default_role: "oe:verantwoordelijke_organisatie"

    # Split-style hooks (same as tekenBeslissing — the status and
    # task logic are identical whether the beslissing is taken
    # directly or triggered via tekenBeslissing).
    status_resolver: "dossier_toelatingen.handlers.resolve_beslissing_status"
    task_builders:
      - "dossier_toelatingen.handlers.schedule_trekAanvraag_if_onvolledig"

    authorization:
      access: "roles"
      roles:
        - role: "systeemgebruiker"
        - role: "gemeente-toevoeger"
          scope:
            from_entity: "oe:verantwoordelijke_organisatie"
            field: "content.uri"

    requirements:
      statuses:
        - "klaar_voor_behandeling"
        - "beslissing_ondertekend"

    used:
      - type: "oe:aanvraag"
        required: false
        auto_resolve: "latest"
        description: "De aanvraag"

    generates:
      - "oe:handtekening"
      - "oe:beslissing"

    status: null

    validators: []
    side_effects: []
    relations:
      - type: "oe:neemtAkteVan"
        validator: "dossier_toelatingen.relation_validators.validate_neemt_akte_van"
    tasks:
      - kind: "recorded"
        function: "dossier_toelatingen.tasks.log_beslissing_genomen"

  - name: "trekAanvraagIn"
    label: "Trek aanvraag in"
    description: "Trekt de aanvraag in (wegens verlopen termijn of op verzoek)"
    can_create_dossier: false

    allowed_roles: ["oe:aanvrager", "systeem"]
    default_role: "systeem"

    authorization:
      access: "roles"
      roles:
        - role: "systeemgebruiker"
        - role: "kbo-toevoeger"
          scope:
            from_entity: "oe:aanvraag"
            field: "content.aanvrager.kbo"
        - from_entity: "oe:aanvraag"
          field: "content.aanvrager.rrn"

    requirements:
      statuses:
        - "aanvraag_onvolledig"

    used: []
    generates: []

    status: "aanvraag_ingetrokken"

    validators: []
    side_effects: []
    tasks: []

# =====================================================================
# System activities
# =====================================================================

  - name: "setDossierAccess"
    label: "Stel dossiertoegang in"
    description: "Bepaalt wie dit dossier kan zien"
    can_create_dossier: false
    client_callable: false
    default_role: "systeem"
    handler: "dossier_toelatingen.handlers.set_dossier_access"

    authorization:
      access: "roles"
      roles:
        - role: "systeemgebruiker"

    used:
      - type: "oe:aanvraag"
        required: false
        auto_resolve: "latest"
        description: "De aanvraag"

    generates:
      - "oe:dossier_access"

    status: null
    validators: []
    side_effects: []
    tasks: []

  - name: "duidVerantwoordelijkeOrganisatieAan"
    label: "Duid verantwoordelijke organisatie aan"
    description: "Bepaalt welke organisatie verantwoordelijk is"
    can_create_dossier: false
    client_callable: false
    default_role: "systeem"
    handler: "dossier_toelatingen.handlers.set_verantwoordelijke_organisatie"

    authorization:
      access: "roles"
      roles:
        - role: "systeemgebruiker"

    requirements:
      activities:
        - "dienAanvraagIn"
      entities:
        - "oe:aanvraag"

    used:
      - type: "oe:aanvraag"
        required: false
        auto_resolve: "latest"
        description: "De aanvraag"

    generates:
      - "oe:verantwoordelijke_organisatie"

    status: null
    validators: []
    side_effects:
      - activity: "duidBehandelaarAan"
      - activity: "setDossierAccess"
    tasks:
      - kind: "recorded"
        function: "dossier_toelatingen.tasks.log_organisatie_aangeduid"

  - name: "duidBehandelaarAan"
    label: "Duid behandelaar aan"
    description: "Wijst een behandelaar toe aan het dossier"
    can_create_dossier: false
    client_callable: false
    default_role: "systeem"
    handler: "dossier_toelatingen.handlers.duid_behandelaar_aan"

    authorization:
      access: "roles"
      roles:
        - role: "systeemgebruiker"

    requirements:
      entities:
        - "oe:verantwoordelijke_organisatie"

    used:
      - type: "oe:verantwoordelijke_organisatie"
        required: false
        auto_resolve: "latest"
        description: "De verantwoordelijke organisatie"
      - type: "oe:aanvraag"
        required: false
        auto_resolve: "latest"
        description: "De aanvraag"

    generates:
      - "oe:behandelaar"

    status: null
    validators: []
    side_effects: []
    tasks:
      - kind: "recorded"
        function: "dossier_toelatingen.tasks.send_behandelaar_notificatie"

  - name: "setSystemFields"
    label: "Stel systeemvelden in"
    description: "Berekent systeemvelden (datum, aanmaker)"
    can_create_dossier: false
    client_callable: false
    default_role: "systeem"
    handler: "dossier_toelatingen.handlers.set_system_fields"

    authorization:
      access: "roles"
      roles:
        - role: "systeemgebruiker"

    used:
      - type: "oe:aanvraag"
        required: false
        auto_resolve: "latest"
        description: "De aanvraag"

    generates:
      - "oe:system_fields"

    status: null
    validators: []
    side_effects: []
    tasks: []

  # -----------------------------------------------------------------------
  # Test-only activities for schema versioning (D8 in test_requests.sh).
  # These exercise the entity_schemas / new_version / allowed_versions
  # mechanism without touching real workflow activities.
  # -----------------------------------------------------------------------

  - name: "testDienAanvraagInV2"
    label: "TEST: Dien aanvraag in (v2 schema)"
    description: "Test-only: creates a v2 aanvraag (with classificatie/urgentie)"
    can_create_dossier: true

    allowed_roles: ["oe:aanvrager"]
    default_role: "oe:aanvrager"

    authorization:
      access: "authenticated"

    forbidden:
      activities:
        - "dienAanvraagIn"
        - "testDienAanvraagInV2"

    used:
      - type: "object"
        external: true
        required: true
        description: "URI van het beschermd erfgoed object"

    generates:
      - "oe:aanvraag"

    entities:
      oe:aanvraag:
        new_version: "v2"

    status: "ingediend"
    validators: []
    side_effects:
      - activity: "duidVerantwoordelijkeOrganisatieAan"
      - activity: "setSystemFields"
    tasks: []

  - name: "testBewerkAanvraagV2Only"
    label: "TEST: Bewerk aanvraag (v2-only)"
    description: "Test-only: revises an aanvraag but only accepts v2"
    can_create_dossier: false

    allowed_roles: ["oe:behandelaar"]
    default_role: "oe:behandelaar"

    authorization:
      access: "roles"
      roles:
        - role: "behandelaar"

    used:
      - type: "object"
        external: true
        required: true
        description: "URI van het beschermd erfgoed object"

    generates:
      - "oe:aanvraag"

    entities:
      oe:aanvraag:
        allowed_versions: ["v2"]

    status: null
    validators: []
    side_effects: []
    tasks: []

  - name: "bewerkRelaties"
    label: "Bewerk dossierrelaties"
    description: "Voeg relaties toe of verwijder ze. Wijzigt geen entiteiten of dossierstatus."
    can_create_dossier: false

    allowed_roles: ["oe:behandelaar"]
    default_role: "oe:behandelaar"

    authorization:
      access: "roles"
      roles:
        - role: "behandelaar"
        - role: "beheerder"

    # No status requirements — available at any point in the lifecycle.
    requirements: {}

    used: []
    generates: []
    status: null

    relations:
      - type: "oe:betreft"
        operations: [add, remove]
      - type: "oe:valtOnder"
        operations: [add, remove]
      - type: "oe:gerelateerd_aan"
        operations: [add, remove]

    validators: []
    side_effects: []
    tasks: []
