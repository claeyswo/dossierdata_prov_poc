    access: "authenticated"

# Built-in tombstone activity authorization. The engine registers a
# `tombstone` activity for every workflow at boot; this block declares
# which user roles can call it. Absent or empty = no one can tombstone
# in this workflow (deny by default).
tombstone:
  allowed_roles: ["beheerder"]

