name: "toelatingen"
description: "Toelatingen beschermd erfgoed"
version: "0.1"

roles:
  - name: "oe:aanvrager"
    description: "Aanvrager van de toelating"
  - name: "oe:behandelaar"
    description: "Dossierbehandelaar"
  - name: "oe:verantwoordelijke_organisatie"
    description: "Organisatie verantwoordelijk voor de behandeling"
  - name: "oe:ondertekenaar"
    description: "Persoon die de beslissing ondertekent"

poc_users:
  - id: "1"
    username: "claeyswo"
    type: "persoon"
    name: "Wouter Claeys"
    roles: ["beheerder"]
    properties:
      ovo_code: "OVO000104"

  - id: "aaa00000-0000-0000-0000-000000000001"
    username: "jan.aanvrager"
    type: "persoon"
    name: "Jan Peeters"
    roles: ["85010100123"]
    properties:
      rrn: "85010100123"

  - id: "aaa00000-0000-0000-0000-000000000002"
    username: "firma.acme"
    type: "persoon"
    name: "ACME BV"
    roles: ["kbo-toevoeger:0123456789"]
    properties:
      kbo: "0123456789"

  - id: "bbb00000-0000-0000-0000-000000000001"
    username: "marie.brugge"
    type: "medewerker"
    name: "Marie Vandenbroeck"
    roles: ["behandelaar", "beslisser", "gemeente-toevoeger:https://data.vlaanderen.be/id/organisatie/brugge"]
    properties:
      gemeente: "Brugge"

  - id: "bbb00000-0000-0000-0000-000000000002"
    username: "benjamma"
    type: "medewerker"
    name: "Matthias Benjamins"
    roles: ["behandelaar", "gemeente-toevoeger:https://data.vlaanderen.be/id/organisatie/oe"]
    properties:
      organisatie: "oe"

  - id: "bbb00000-0000-0000-0000-000000000003"
    username: "sophie.tekent"
    type: "medewerker"
    name: "Sophie Marchand"
    roles: ["beslisser", "gemeente-toevoeger:https://data.vlaanderen.be/id/organisatie/oe", "behandelaar"]
    properties:
      organisatie: "oe"

entity_types:
  - type: "oe:aanvraag"
    description: "Aanvraag voor een toelating"
    cardinality: "single"
    revisable: true
    model: "gov_dossier_toelatingen.entities.Aanvraag"
    schemas:
      v1: "gov_dossier_toelatingen.entities.Aanvraag"
      v2: "gov_dossier_toelatingen.entities.AanvraagV2"

  - type: "oe:beslissing"
    description: "Beslissing over een toelating"
    cardinality: "single"
    revisable: true
    model: "gov_dossier_toelatingen.entities.Beslissing"

  - type: "oe:handtekening"
    description: "Handtekening op een beslissing"
    cardinality: "single"
    revisable: true
    model: "gov_dossier_toelatingen.entities.Handtekening"

  - type: "oe:verantwoordelijke_organisatie"
    description: "Verantwoordelijke organisatie voor een toelating"
    cardinality: "single"
    revisable: true
    model: "gov_dossier_toelatingen.entities.VerantwoordelijkeOrganisatie"

  - type: "oe:behandelaar"
    description: "Behandelaar van de toelating"
    cardinality: "multiple"
    revisable: true
    model: "gov_dossier_toelatingen.entities.Behandelaar"

  - type: "oe:system_fields"
    description: "Berekende velden voor een toelating"
    cardinality: "single"
    revisable: true
    model: "gov_dossier_toelatingen.entities.SystemFields"

  - type: "oe:dossier_access"
    description: "Bepaalt wie dit dossier kan zien en wat ze kunnen zien"
    cardinality: "single"
    revisable: true
    model: "gov_dossier_engine.entities.DossierAccess"

authorization:
  create_dossier:
    access: "authenticated"

# Built-in tombstone activity authorization. The engine registers a
# `tombstone` activity for every workflow at boot; this block declares
# which user roles can call it. Absent or empty = no one can tombstone
# in this workflow (deny by default).
tombstone:
  allowed_roles: ["beheerder"]

# Workflow-wide PROV-extension relations. Any activity in this workflow may
# emit these on its request body unless it overrides the list with its own
# `relations:` block. Each entry declares a relation type and the plugin
# must register a validator under that name (or accept pure-annotation
# semantics if no validator is registered).
relations:
  - type: "oe:neemtAkteVan"
    description: >
      Acknowledges that the client is aware of a newer version of an entity
      it used, and has chosen to proceed with the older version anyway. The
      engine rejects an activity whose `used` block references a stale
      entity version unless every intervening newer version is listed here.

activities:

  - name: "dienAanvraagIn"
    label: "Dien aanvraag in"
    description: "Dien aanvraag in voor een toelating"
    can_create_dossier: true

    allowed_roles: ["oe:aanvrager"]
    default_role: "oe:aanvrager"

    authorization:
      access: "authenticated"

    forbidden:
      activities:
        - "dienAanvraagIn"

    used:
      - type: "object"
        external: true
        required: true
        description: "URI van het beschermd erfgoed object"

    generates:
      - "oe:aanvraag"

    status: "ingediend"

    validators:
      - name: "valideer_indiening"
        description: "Valideert de aanvraag bij indiening"

    side_effects:
      - activity: "duidVerantwoordelijkeOrganisatieAan"
      - activity: "setSystemFields"

    tasks:
      - kind: "recorded"
        function: "move_bijlagen_to_permanent"
      - kind: "recorded"
        function: "send_ontvangstbevestiging"

  - name: "bewerkAanvraag"
    label: "Bewerk aanvraag"
    description: "Behandelaar bewerkt de aanvraag"
    can_create_dossier: false

    allowed_roles: ["oe:behandelaar"]
    default_role: "oe:behandelaar"

    authorization:
      access: "roles"
      roles:
        - role: "behandelaar"

    requirements:
      statuses:
        - "klaar_voor_behandeling"

    used:
      - type: "object"
        external: true
        required: true
        description: "URI van het beschermd erfgoed object"

    generates:
      - "oe:aanvraag"

    status: "ingediend"

    validators:
      - name: "valideer_indiening"
        description: "Valideert de bewerkte aanvraag"

    side_effects:
      - activity: "duidVerantwoordelijkeOrganisatieAan"
      - activity: "setSystemFields"

    relations:
      - type: "oe:neemtAkteVan"

    tasks:
      - kind: "recorded"
        function: "move_bijlagen_to_permanent"

  - name: "vervolledigAanvraag"
    label: "Vervolledig aanvraag"
    description: "Aanvrager vervolledig een onvolledige aanvraag"
    can_create_dossier: false

    allowed_roles: ["oe:aanvrager"]
    default_role: "oe:aanvrager"

    authorization:
      access: "roles"
      roles:
        - role: "kbo-toevoeger"
          scope:
            from_entity: "oe:aanvraag"
            field: "content.aanvrager.kbo"
        - from_entity: "oe:aanvraag"
          field: "content.aanvrager.rrn"

    requirements:
      statuses:
        - "aanvraag_onvolledig"

    used:
      - type: "object"
        external: true
        required: true
        description: "URI van het beschermd erfgoed object"

    generates:
      - "oe:aanvraag"

    status: "ingediend"

    validators:
      - name: "valideer_indiening"
        description: "Valideert de vervolledigde aanvraag"

    side_effects:
      - activity: "duidVerantwoordelijkeOrganisatieAan"
      - activity: "setSystemFields"

    relations:
      - type: "oe:neemtAkteVan"

    tasks:
      - kind: "recorded"
        function: "move_bijlagen_to_permanent"
      - kind: "recorded"
        function: "send_ontvangstbevestiging"

  - name: "doeVoorstelBeslissing"
    label: "Doe voorstel beslissing"
    description: "Behandelaar doet een voorstel voor een beslissing"
    can_create_dossier: false

    allowed_roles: ["oe:behandelaar"]
    default_role: "oe:behandelaar"

    authorization:
      access: "roles"
      roles:
        - role: "behandelaar"

    requirements:
      statuses:
        - "klaar_voor_behandeling"

    used:
      - type: "oe:aanvraag"
        required: false
        auto_resolve: "latest"
        description: "De aanvraag"

    generates:
      - "oe:beslissing"

    status: "beslissing_te_tekenen"

    validators: []
    side_effects: []
    relations:
      - type: "oe:neemtAkteVan"
    tasks: []

  - name: "tekenBeslissing"
    label: "Teken beslissing"
    description: "Ondertekenaar tekent de beslissing"
    can_create_dossier: false

    allowed_roles: ["oe:ondertekenaar"]
    default_role: "oe:ondertekenaar"

    handler: "handle_beslissing"

    authorization:
      access: "roles"
      roles:
        - role: "beslisser"

    requirements:
      entities:
        - "oe:beslissing"
      statuses:
        - "beslissing_te_tekenen"

    used:
      - type: "oe:beslissing"
        required: false
        auto_resolve: "latest"
        description: "De beslissing die getekend wordt"

    generates:
      - "oe:handtekening"

    status: null

    validators: []
    side_effects: []
    relations:
      - type: "oe:neemtAkteVan"
    tasks: []

  - name: "neemBeslissing"
    label: "Neem beslissing"
    description: "Neem een beslissing. Kan direct aangeroepen worden of automatisch getriggerd via tekenBeslissing."
    can_create_dossier: false

    allowed_roles: ["oe:verantwoordelijke_organisatie"]
    default_role: "oe:verantwoordelijke_organisatie"

    handler: "handle_beslissing"

    authorization:
      access: "roles"
      roles:
        - role: "systeemgebruiker"
        - role: "gemeente-toevoeger"
          scope:
            from_entity: "oe:verantwoordelijke_organisatie"
            field: "content.uri"

    requirements:
      statuses:
        - "klaar_voor_behandeling"
        - "beslissing_ondertekend"

    used:
      - type: "oe:aanvraag"
        required: false
        auto_resolve: "latest"
        description: "De aanvraag"

    generates:
      - "oe:handtekening"
      - "oe:beslissing"

    status: null

    validators: []
    side_effects: []
    relations:
      - type: "oe:neemtAkteVan"
    tasks:
      - kind: "recorded"
        function: "log_beslissing_genomen"

  - name: "trekAanvraagIn"
    label: "Trek aanvraag in"
    description: "Trekt de aanvraag in (wegens verlopen termijn of op verzoek)"
    can_create_dossier: false

    allowed_roles: ["oe:aanvrager", "systeem"]
    default_role: "systeem"

    authorization:
      access: "roles"
      roles:
        - role: "systeemgebruiker"
        - role: "kbo-toevoeger"
          scope:
            from_entity: "oe:aanvraag"
            field: "content.aanvrager.kbo"
        - from_entity: "oe:aanvraag"
          field: "content.aanvrager.rrn"

    requirements:
      statuses:
        - "aanvraag_onvolledig"

    used: []
    generates: []

    status: "aanvraag_ingetrokken"

    validators: []
    side_effects: []
    tasks: []

# =====================================================================
# System activities
# =====================================================================

  - name: "setDossierAccess"
    label: "Stel dossiertoegang in"
    description: "Bepaalt wie dit dossier kan zien"
    can_create_dossier: false
    client_callable: false
    default_role: "systeem"
    handler: "set_dossier_access"

    authorization:
      access: "roles"
      roles:
        - role: "systeemgebruiker"

    used:
      - type: "oe:aanvraag"
        required: false
        auto_resolve: "latest"
        description: "De aanvraag"

    generates:
      - "oe:dossier_access"

    status: null
    validators: []
    side_effects: []
    tasks: []

  - name: "duidVerantwoordelijkeOrganisatieAan"
    label: "Duid verantwoordelijke organisatie aan"
    description: "Bepaalt welke organisatie verantwoordelijk is"
    can_create_dossier: false
    client_callable: false
    default_role: "systeem"
    handler: "set_verantwoordelijke_organisatie"

    authorization:
      access: "roles"
      roles:
        - role: "systeemgebruiker"

    requirements:
      activities:
        - "dienAanvraagIn"
      entities:
        - "oe:aanvraag"

    used:
      - type: "oe:aanvraag"
        required: false
        auto_resolve: "latest"
        description: "De aanvraag"

    generates:
      - "oe:verantwoordelijke_organisatie"

    status: null
    validators: []
    side_effects:
      - activity: "duidBehandelaarAan"
      - activity: "setDossierAccess"
    tasks:
      - kind: "recorded"
        function: "log_organisatie_aangeduid"

  - name: "duidBehandelaarAan"
    label: "Duid behandelaar aan"
    description: "Wijst een behandelaar toe aan het dossier"
    can_create_dossier: false
    client_callable: false
    default_role: "systeem"
    handler: "duid_behandelaar_aan"

    authorization:
      access: "roles"
      roles:
        - role: "systeemgebruiker"

    requirements:
      entities:
        - "oe:verantwoordelijke_organisatie"

    used:
      - type: "oe:verantwoordelijke_organisatie"
        required: false
        auto_resolve: "latest"
        description: "De verantwoordelijke organisatie"
      - type: "oe:aanvraag"
        required: false
        auto_resolve: "latest"
        description: "De aanvraag"

    generates:
      - "oe:behandelaar"

    status: null
    validators: []
    side_effects: []
    tasks:
      - kind: "recorded"
        function: "send_behandelaar_notificatie"

  - name: "setSystemFields"
    label: "Stel systeemvelden in"
    description: "Berekent systeemvelden (datum, aanmaker)"
    can_create_dossier: false
    client_callable: false
    default_role: "systeem"
    handler: "set_system_fields"

    authorization:
      access: "roles"
      roles:
        - role: "systeemgebruiker"

    used:
      - type: "oe:aanvraag"
        required: false
        auto_resolve: "latest"
        description: "De aanvraag"

    generates:
      - "oe:system_fields"

    status: null
    validators: []
    side_effects: []
    tasks: []

  # -----------------------------------------------------------------------
  # Test-only activities for schema versioning (D8 in test_requests.sh).
  # These exercise the entity_schemas / new_version / allowed_versions
  # mechanism without touching real workflow activities.
  # -----------------------------------------------------------------------

  - name: "testDienAanvraagInV2"
    label: "TEST: Dien aanvraag in (v2 schema)"
    description: "Test-only: creates a v2 aanvraag (with classificatie/urgentie)"
    can_create_dossier: true

    allowed_roles: ["oe:aanvrager"]
    default_role: "oe:aanvrager"

    authorization:
      access: "authenticated"

    forbidden:
      activities:
        - "dienAanvraagIn"
        - "testDienAanvraagInV2"

    used:
      - type: "object"
        external: true
        required: true
        description: "URI van het beschermd erfgoed object"

    generates:
      - "oe:aanvraag"

    entities:
      oe:aanvraag:
        new_version: "v2"

    status: "ingediend"
    validators: []
    side_effects:
      - activity: "duidVerantwoordelijkeOrganisatieAan"
      - activity: "setSystemFields"
    tasks: []

  - name: "testBewerkAanvraagV2Only"
    label: "TEST: Bewerk aanvraag (v2-only)"
    description: "Test-only: revises an aanvraag but only accepts v2"
    can_create_dossier: false

    allowed_roles: ["oe:behandelaar"]
    default_role: "oe:behandelaar"

    authorization:
      access: "roles"
      roles:
        - role: "behandelaar"

    used:
      - type: "object"
        external: true
        required: true
        description: "URI van het beschermd erfgoed object"

    generates:
      - "oe:aanvraag"

    entities:
      oe:aanvraag:
        allowed_versions: ["v2"]

    status: null
    validators: []
    side_effects: []
    tasks: []
